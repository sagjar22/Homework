<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an HTML page with a list of products.</title>
    <link rel="stylesheet" href="./first_task.css">
    <link rel="shortcut icon" href="../shared_resources/favicon/html_favicon.png">
</head>

<body>
    <h2>What do I have in my fridge?</h2>

    <div class="products">

        <div class="product">
            <img src="../shared_resources/icon/pepper.png" alt="pepper icon">
            <div class="name">Pepper</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/apple.png" alt="apple icon">
            <div class="name">Apple</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/cheese.png" alt="cheese icon">
            <div class="name">Cheese</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/corn.png" alt="corn icon">
            <div class="name">Corn</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/mushroom.png" alt="mushroom icon">
            <div class="name">Mushroom</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/garlic.png" alt="garlic icon">
            <div class="name">Garlic</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/beef.png" alt="beef icon">
            <div class="name">Beef</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/fish.png" alt="fish icon">
            <div class="name">Fish</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/egg.png" alt="egg icon">
            <div class="name">Eggs</div>
        </div>

        <div class="product">
            <img src="../shared_resources/icon/coriander.png" alt="coriander icon">
            <div class="name">Coriander</div>
        </div>

    </div>
    <hr>
    <div class="footer"><b>... that's all ...</b></div>
</body>

</html>
