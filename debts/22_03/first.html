<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement an HTML page that simulates the video download process.</title>
    <link rel="stylesheet" href="./first.css">
    <link rel="shortcut icon" href="../../shared_resources/favicon/html_favicon.png">
</head>

<body>
    <div class="container">
        <div class="image-block">
            <img src="../../shared_resources/icon/loading.png" alt="upload">
        </div>

        <div class="info-block">

            <div class="top-row">
                <div class="progress">
                    <div class="progress-fill"></div>
                    <span class="progress-text">UPLOADING 40%</span>
                    <span class="time">About 23 minutes remaining</span>
                </div>

                <button>DONE</button>
            </div>

            <h3>Title of video</h3>
            <p>* Your video is still uploading. Please keep this page open until it's done.</p>
        </div>
    </div>
</body>

</html>
