<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Library</title>
    <link rel="stylesheet" href="second.css">
    <link rel="shortcut icon" href="../shared_resources/favicon/html_favicon.png">
</head>

<body>
    <h3>Inputs</h3>
    <input class="input" placeholder="Enter some text">
    <input class="input valid" value="valid text" readonly>
    <input class="input invalid" value="invalid text" readonly>

    <h3>Check boxes</h3>

    <label class="checkbox-left">
        <input type="checkbox">
        <span></span>
        Subscribe
    </label>

    <label class="checkbox-right">
        <input type="checkbox">
        <span></span>
        Subscribe
    </label>

    <h3>Radio buttons</h3>
    <label class="radio">
        <input type="radio" name="gender" checked>
        <span></span>
        Male
    </label>

    <label class="radio">
        <input type="radio" name="gender">
        <span></span>
        Female
    </label>

    <h3>Buttons</h3>
    <button class="btn green">Active</button>
    <button class="btn green">Hover</button>
    <button class="btn red">Danger</button>
    <button class="btn red">Hover</button>
    <button class="btn disabled">Disabled</button>

    <button class="circle green">+</button>
    <button class="circle red">−</button>

    <h3>Text area</h3>
    <textarea class="textarea" placeholder="Enter some text..."></textarea>
</body>

</html>
