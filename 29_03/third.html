<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement an html page with a form for registration and maintaining personal data.</title>
    <link rel="stylesheet" href="./third.css">
    <link rel="shortcut icon" href="../shared_resources/favicon/html_favicon.png">
</head>

<body>
    <div class="container">
        <form class="form">

            <div class="grid">
                <div class="block">
                    <h2>Registration form</h2>

                    <input type="text" placeholder="Username">
                    <input type="email" placeholder="Email address">

                    <div class="row">
                        <input type="password" placeholder="Password">
                        <input type="password" placeholder="Confirm password">
                    </div>
                </div>


                <div class="block">
                    <h2>Personal details</h2>

                    <div class="row">
                        <input type="text" placeholder="First name">
                        <input type="text" placeholder="Last name">
                    </div>

                    <div class="row">
                        <select>
                            <option>Male</option>
                            <option>Female</option>
                        </select>

                        <input type="date">
                    </div>
                </div>

            </div>
            <div class="checks">
                <label><input type="checkbox"> I want to receive news and special offers</label>
                <label><input type="checkbox"> I agree with the Terms and Conditions</label>
            </div>


            <button type="submit">SUBMIT</button>
        </form> 
    </div>
</body>

</html>
