<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice 29_03 - Implement an html page with a login form.</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="../../shared_resources/favicon.jpg">
</head>

<body>
    <div class="container">
        <div class="next">
            <img src="../../shared_resources/icon/account.png" alt="basic account icon">
            <h2>Member Login</h2>
            <br>
            <div class="usefull">
                <input class="user" type="text" name="username" id="username" placeholder="Username">
                <input type="text" name="password" id="password" placeholder="Password">
                <p class="login">Login</p>
            </div>
            <a class="forgot" href="#">Forgot password?</a>
        </div>
        <p>...or login with:
        <div class="face-container">
            <a class="face" href="#">Facebook</a>
        </div>
        <div class="twit-container">
            <a class="twit" href="#"><img>Twitter</a>
        </div>
    </div>
    </div>
</body>

</html>
