<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement an html page with a form for sending a message.</title>
    <link rel="stylesheet" href="./second.css">
    <link rel="shortcut icon" href="../../shared_resources/favicon/html_favicon.png"> 
</head>

<body>
    <div class="form-box">
        <h2>Contact form</h2>
        <p class="title">Please fill in your information and we'll be sending your order.</p>

        <form>
            <label>Your name</label>
            <div class="row">
                <input type="text">
                <input type="text">
            </div>

            <label>Your email</label>
            <input type="email">

            <label>Phone *</label>
            <div class="row">
                <input type="text">
                <input type="text">
                <input type="text">
            </div>

            <label>Message subject *</label>
            <select>
                <option>Other</option>
                <option>Question</option>
                <option>Support</option>
            </select>
            <label>Message *</label>
            <textarea></textarea>
            <hr>
            <button type="submit">SUBMIT FORM</button>
        </form>
    </div>

</body>

</html>
