<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement an html page with a form for entering credit card data
        cards</title>
    <link rel="stylesheet" href="./syle.css">
    <link rel="shortcut icon" href="../shared_resources/favicon/html_favicon.png">
</head>

<body>
    <div class="card-container">
        <div class="title">CREDIT CARD DETAILS</div>
        <label>Card Number</label>
        <form class="card-num">
            <input type="text" placeholder="1234 5678 9012 3456" maxlength="19">
        </form>
        <label>Name On Card</label>
        <form class="card-name">
            <input type="text" placeholder="Name Surname">
        </form>
        <div class="row">
            <div>
                <label>Expire Date</label>
                <form class="card-date">
                    <div class="row">
                        <input class="small" type="text" placeholder="MM" maxlength="2">
                        <input class="small" type="text" placeholder="YY" maxlength="2">
                </form>
            </div>
        </div>

        <div>
            <label>CVV No.</label>
            <form class="card-passw">
                <input class="cvv" type="password" placeholder="***" maxlength="3">
            </form>
        </div>
    </div>
    </form>
    <img src="../shared_resources/icon/png-transparent-flag-galaxy-goal-lunar-moon-planet-space-space-flat-galaxy-radio-icon.png" class="card-img" alt="galaxy goal lunar moon planet icon">
    </div>
</body>

</html>
